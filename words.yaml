word_stress:
  name: word stress patterns
  description: correct syllable emphasis changes meaning and clarity
  words:
    - word: present
      ipa: /ˈprɛzənt/ (noun) /prɪˈzɛnt/ (verb)
      example: I want to present a present to you.
      difficulty: 2
    - word: record
      ipa: /ˈrɛkərd/ (noun) /rɪˈkɔːrd/ (verb)
      example: She wants to record a new record.
      difficulty: 2
    - word: desert
      ipa: /ˈdɛzərt/ (noun) /dɪˈzɜːrt/ (verb)
      example: Don't desert me in the desert.
      difficulty: 2
    - word: photograph
      ipa: /ˈfoʊtəˌɡræf/
      example: Take a photograph of the sunset.
      difficulty: 2
    - word: photography
      ipa: /fəˈtɑːɡrəfi/
      example: She studies photography at college.
      difficulty: 3
    - word: photographic
      ipa: /ˌfoʊtəˈɡræfɪk/
      example: He has a photographic memory.
      difficulty: 3
    - word: economy
      ipa: /ɪˈkɑːnəmi/
      example: The economy is improving.
      difficulty: 2
    - word: economic
      ipa: /ˌiːkəˈnɑːmɪk/
      example: Economic growth is steady.
      difficulty: 3
    - word: comfortable
      ipa: /ˈkʌmftərbəl/
      example: This chair is very comfortable.
      difficulty: 2
    - word: vegetable
      ipa: /ˈvɛdʒtəbəl/
      example: Eat your vegetables every day.
      difficulty: 2
