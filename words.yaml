th_voiced:
  name: 'th voiced (ð)'
  description: 'as in "this", "that" - tongue between teeth, vibrate'
  words:
    - word: this
      ipa: /ðɪs/
      example: Is this your book?
      difficulty: 1
    - word: that
      ipa: /ðæt/
      example: That was amazing.
      difficulty: 1
    - word: the
      ipa: /ðə/
      example: The cat sat on the mat.
      difficulty: 1
    - word: there
      ipa: /ðɛr/
      example: There are many options.
      difficulty: 1
    - word: they
      ipa: /ðeɪ/
      example: They went to the park.
      difficulty: 1
    - word: these
      ipa: /ðiːz/
      example: These are my friends.
      difficulty: 1
    - word: those
      ipa: /ðoʊz/
      example: Those flowers are beautiful.
      difficulty: 1
    - word: weather
      ipa: /ˈwɛðər/
      example: The weather is nice today.
      difficulty: 2
    - word: together
      ipa: /təˈɡɛðər/
      example: We work together every day.
      difficulty: 2
    - word: breathe
      ipa: /briːð/
      example: Take a moment to breathe deeply.
      difficulty: 2

th_voiceless:
  name: 'th voiceless (θ)'
  description: 'as in "think", "bath" - tongue between teeth, no vibration'
  words:
    - word: think
      ipa: /θɪŋk/
      example: I think it will rain.
      difficulty: 1
    - word: thing
      ipa: /θɪŋ/
      example: The most important thing is practice.
      difficulty: 1
    - word: three
      ipa: /θriː/
      example: I have three cats.
      difficulty: 1
    - word: thank
      ipa: /θæŋk/
      example: Thank you very much.
      difficulty: 1
    - word: thought
      ipa: /θɔːt/
      example: I thought about it carefully.
      difficulty: 2
    - word: through
      ipa: /θruː/
      example: We walked through the forest.
      difficulty: 2
    - word: Thursday
      ipa: /ˈθɜːrzdeɪ/
      example: The meeting is on Thursday.
      difficulty: 2
    - word: beneath
      ipa: /bɪˈniːθ/
      example: The treasure lies beneath the surface.
      difficulty: 2
    - word: growth
      ipa: /ɡroʊθ/
      example: Economic growth has been steady.
      difficulty: 2
    - word: mathematics
      ipa: /ˌmæθəˈmætɪks/
      example: She studies mathematics at university.
      difficulty: 3

sh_ch:
  name: sh (ʃ) and ch (tʃ)
  description: sh - lips rounded, air through wide tongue; ch - starts with t then sh
  words:
    - word: ship
      ipa: /ʃɪp/
      example: The ship sailed across the ocean.
      difficulty: 1
    - word: shop
      ipa: /ʃɑːp/
      example: I need to go to the shop.
      difficulty: 1
    - word: she
      ipa: /ʃiː/
      example: She is a great teacher.
      difficulty: 1
    - word: wish
      ipa: /wɪʃ/
      example: I wish you the best.
      difficulty: 1
    - word: chip
      ipa: /tʃɪp/
      example: There is a chip in the glass.
      difficulty: 1
    - word: church
      ipa: /tʃɜːrtʃ/
      example: The old church is beautiful.
      difficulty: 2
    - word: catch
      ipa: /kætʃ/
      example: Try to catch the ball.
      difficulty: 1
    - word: watch
      ipa: /wɑːtʃ/
      example: Let me watch this movie.
      difficulty: 1
    - word: machine
      ipa: /məˈʃiːn/
      example: The machine works perfectly.
      difficulty: 2
    - word: championship
      ipa: /ˈtʃæmpiənʃɪp/
      example: They won the championship last year.
      difficulty: 3

r_l:
  name: r and l contrast
  description: r - tongue curled back, no contact; l - tongue touches ridge behind teeth
  words:
    - word: right
      ipa: /raɪt/
      example: Turn right at the corner.
      difficulty: 1
    - word: light
      ipa: /laɪt/
      example: Turn on the light please.
      difficulty: 1
    - word: red
      ipa: /rɛd/
      example: The car is red.
      difficulty: 1
    - word: led
      ipa: /lɛd/
      example: She led the team to victory.
      difficulty: 1
    - word: road
      ipa: /roʊd/
      example: The road was long and winding.
      difficulty: 1
    - word: load
      ipa: /loʊd/
      example: The truck carried a heavy load.
      difficulty: 1
    - word: really
      ipa: /ˈriːəli/
      example: I really appreciate your help.
      difficulty: 2
    - word: rarely
      ipa: /ˈrɛrli/
      example: I rarely eat fast food.
      difficulty: 2
    - word: parallel
      ipa: /ˈpærəˌlɛl/
      example: The lines are parallel to each other.
      difficulty: 3
    - word: literally
      ipa: /ˈlɪtərəli/
      example: I literally just arrived.
      difficulty: 3

vowel_pairs:
  name: vowel pairs (æ/ɛ, iː/ɪ, uː/ʊ)
