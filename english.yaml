      ipa: /θɪŋk/
      example: I think it will rain.
      difficulty: 1
    - word: thing
      ipa: /θɪŋ/
      example: The most important thing is practice.
      difficulty: 1
    - word: three
      ipa: /θriː/
      example: I have three cats.
      difficulty: 1
    - word: thank
      ipa: /θæŋk/
      example: Thank you very much.
      difficulty: 1
    - word: thought
      ipa: /θɔːt/
      example: I thought about it carefully.
      difficulty: 2
    - word: through
      ipa: /θruː/
      example: We walked through the forest.
      difficulty: 2
    - word: Thursday
      ipa: /ˈθɜːrzdeɪ/
      example: The meeting is on Thursday.
      difficulty: 2
    - word: beneath
      ipa: /bɪˈniːθ/
      example: The treasure lies beneath the surface.
      difficulty: 2
    - word: growth
      ipa: /ɡroʊθ/
      example: Economic growth has been steady.
      difficulty: 2
    - word: mathematics
      ipa: /ˌmæθəˈmætɪks/
      example: She studies mathematics at university.
      difficulty: 3

